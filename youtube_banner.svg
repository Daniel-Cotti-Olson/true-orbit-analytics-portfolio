        <!-- Decorative elements -->
        <path d="M200 150 L 500 300" stroke="#555555" stroke-width="2"/>
        <path d="M1000 100 L 1300 250" stroke="#555555" stroke-width="2"/>
        <rect x="950" y="280" width="200" height="20" fill="#FF5555" opacity="0.3"/>
